<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생활지도 누가기록 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <!-- 로그인 화면 -->
    <div id="auth-screen" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
        <h2 class="text-2xl font-bold mb-6 text-center">생활지도 대시보드 로그인</h2>
        <select id="class-select" class="w-full p-3 border mb-4 rounded">
            <option value="">학급을 선택하세요</option>
            <script>
                for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}반</option>`);
            </script>
        </select>
        <input type="password" id="auth-code" placeholder="인증번호 4자리" class="w-full p-3 border mb-4 rounded">
        <button onclick="checkAuth()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">로그인</button>
    </div>

    <!-- 대시보드 화면 -->
    <div id="dashboard-screen" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold" id="dashboard-title"></h1>
            <button onclick="location.reload()" class="bg-gray-500 text-white px-4 py-2 rounded">로그아웃</button>
        </div>

        <!-- 탭 메뉴 -->
        <div class="flex border-b mb-6">
            <button onclick="showTab('list')" class="px-6 py-2 border-b-2 border-blue-600 font-bold" id="tab-list">최신순 목록</button>
            <button onclick="showTab('stats')" class="px-6 py-2 text-gray-500" id="tab-stats">학급 통계</button>
        </div>

        <!-- 탭 내용 -->
        <div id="stats-view" class="hidden">
            <div id="stats-summary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>
            <h2 class="text-xl font-bold mb-4">학생별 진달래 체크 상세 현황 (누적순)</h2>
            <div id="stats-details" class="grid gap-4"></div>
        </div>
        
        <div id="list-view">
            <div id="student-list" class="grid gap-4"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyp73QiiXfUjiXxO7Elc3UzR9GHZ4eVQ6l7aivz5kUNOT8pqKcnWfbJBe69G_sL8qrZ/exec";
        const authData = { "1":"8291", "2":"5634", "3":"9172", "4":"3048", "5":"2469", "6":"7715", "7":"1943", "8":"4720", "9":"1085", "10":"6394", "11":"7256", "12":"5103", "13":"3827" };

        function checkAuth() {
            const selected = document.getElementById("class-select").value;
            const code = document.getElementById("auth-code").value;
            if (authData[selected] === code) {
                document.getElementById("auth-screen").classList.add("hidden");
                document.getElementById("dashboard-screen").classList.remove("hidden");
                document.getElementById("dashboard-title").innerText = selected + "반 생활지도 현황";
                loadData(parseInt(selected));
            } else { alert("인증번호가 틀렸습니다."); }
        }

        function showTab(tab) {
            const isList = tab === 'list';
            document.getElementById('list-view').classList.toggle('hidden', !isList);
            document.getElementById('stats-view').classList.toggle('hidden', isList);
            document.getElementById('tab-list').className = isList ? "px-6 py-2 border-b-2 border-blue-600 font-bold" : "px-6 py-2 text-gray-500";
            document.getElementById('tab-stats').className = !isList ? "px-6 py-2 border-b-2 border-blue-600 font-bold" : "px-6 py-2 text-gray-500";
        }

        async function loadData(targetClass) {
            const list = document.getElementById('student-list');
            const stats = document.getElementById('stats-summary');
            const details = document.getElementById('stats-details');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const classData = data.filter(item => parseInt(item.반) === targetClass);
                
                const students = {};
                let totalChecks = 0;
                classData.forEach(item => {
                    if (!students[item.학번]) students[item.학번] = { 이름: item.이름, 기록: [], 체크: 0, 체크상세: [] };
                    students[item.학번].기록.push(item);
                    if (item.진달래체크 == true || item.진달래체크 == "TRUE" || item.진달래체크 == "체크") {
                        students[item.학번].체크++;
                        students[item.학번].체크상세.push({ 월: item.월, 일: item.일, 비고: item.비고 || '사유 없음' });
                        totalChecks++;
                    }
                });

                stats.innerHTML = `
                    <div class="bg-blue-500 text-white p-4 rounded shadow">학급 총 기록: ${classData.length}회</div>
                    <div class="bg-green-500 text-white p-4 rounded shadow">진달래 총 체크: ${totalChecks}회</div>
                    <div class="bg-purple-500 text-white p-4 rounded shadow">체크 인원: ${Object.values(students).filter(s=>s.체크>0).length}명</div>
                `;

                // 통계 탭: 체크 횟수 많은 순 정렬
                const sortedStats = Object.values(students).filter(s => s.체크 > 0).sort((a, b) => b.체크 - a.체크);
                
                details.innerHTML = sortedStats.map(s => `
                    <div class="bg-white p-4 rounded shadow border-l-4 border-red-500">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-lg">${s.이름}</span>
                            <span class="bg-red-100 text-red-700 px-3 py-1 rounded-full font-bold">총 ${s.체크}회</span>
                        </div>
                        <ul class="text-sm text-gray-700 space-y-1 border-t pt-2">
                            ${s.체크상세.map(c => `<li class="flex"><span class="w-16 font-semibold">${c.월}/${c.일}</span><span>${c.비고}</span></li>`).join('')}
                        </ul>
                    </div>
                `).join('');

                const sortedKeys = Object.keys(students).sort((a, b) => {
                    const recA = students[a].기록[students[a].기록.length - 1];
                    const recB = students[b].기록[students[b].기록.length - 1];
                    return (recB.월 * 100 + recB.일) - (recA.월 * 100 + recA.일);
                });

                list.innerHTML = sortedKeys.map(id => {
                    const s = students[id];
                    const last = s.기록[s.기록.length-1];
                    return `
                        <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 ${s.체크 > 0 ? 'border-red-400' : 'border-blue-400'}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-lg">${s.이름} (${id})</span>
                                <span class="text-sm font-bold text-red-600">진달래 ${s.체크}회</span>
                            </div>
                            <div class="text-sm text-gray-700">
                                <strong>최근 기록:</strong> ${last.지도항목} (${last.월}/${last.일}) <br/>
                                <span class="italic text-gray-500">사유: ${last.비고 || '없음'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { list.innerHTML = "<p class='text-center'>데이터 로드 실패</p>"; }
        }
    </script>
</body>
</html>
